# Pose oscillation config (no cigarette model, faster)

walking_smoking:
  enabled: true
  speed_threshold: 0.8
  min_duration_frames: 5
  confidence_threshold: 0.4
  pose_wrist_nose_ratio: 0.15
  min_oscillations: 2

bicycle_phone:
  enabled: false
bicycle_umbrella:
  enabled: false
bicycle_wrong_way:
  enabled: false
signal_violation:
  enabled: false
sidewalk_riding:
  enabled: false

detection:
  model: "yolov8n.pt"
  confidence: 0.35
  iou_threshold: 0.5
  classes: [0, 1]
  use_pose: true
  pose_model: "yolov8n-pose.pt"

tracking:
  max_age: 30
  min_hits: 2
  iou_threshold: 0.3

location:
  lat: 35.6938
  lon: 139.7034
  name: "Kabukicho, Shinjuku"
