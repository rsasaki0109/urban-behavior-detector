walking_smoking:
  enabled: false
walking_phone:
  enabled: false
bicycle_phone:
  enabled: false
bicycle_umbrella:
  enabled: false
bicycle_wrong_way:
  enabled: false
signal_violation:
  enabled: false
sidewalk_riding:
  enabled: true
  sidewalk_zones:
    - [[200, 0], [1100, 0], [1100, 720], [200, 720]]
  min_duration_frames: 3
  confidence_threshold: 0.4
  min_speed: 0.5

detection:
  model: "yolov8n.pt"
  confidence: 0.3
  iou_threshold: 0.5
  classes: [0, 1]
  use_pose: false

tracking:
  max_age: 30
  min_hits: 1
  iou_threshold: 0.25
