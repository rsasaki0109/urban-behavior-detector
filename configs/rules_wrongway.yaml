walking_smoking:
  enabled: false
walking_phone:
  enabled: false
bicycle_phone:
  enabled: false
bicycle_umbrella:
  enabled: false
bicycle_wrong_way:
  enabled: true
  expected_direction: "right"
  angle_tolerance: 45
  min_duration_frames: 3
  confidence_threshold: 0.4
  speed_threshold: 1.0
signal_violation:
  enabled: false
sidewalk_riding:
  enabled: false

detection:
  model: "yolov8n.pt"
  confidence: 0.3
  iou_threshold: 0.5
  classes: [0, 1]
  use_pose: false

tracking:
  max_age: 30
  min_hits: 1
  iou_threshold: 0.25
